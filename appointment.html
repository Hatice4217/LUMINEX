<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMINEX - Randevu Al</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700&display=swap" rel="stylesheet">
<script>
      try {
        if (localStorage.getItem('sidebarCollapsed') === 'true') {
          document.documentElement.classList.add('sidebar-is-collapsed');
        }
      } catch (e) {}
    </script>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        /* --- NEW APPOINTMENT PAGE LAYOUT STYLES --- */
        
        /* 1. Two-Column Layout */
        .appointment-layout {
            display: grid;
            grid-template-columns: 1fr 380px; /* Left fluid, Right fixed */
            gap: 30px;
            align-items: start;
        }

        @media (max-width: 992px) {
            .appointment-layout {
                grid-template-columns: 1fr; /* Stack on smaller screens */
            }
        }

        /* 2. Card UI for Form Sections */
        .form-section-card {
            background: var(--white-color);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .form-section-card:hover {
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
        }

        .form-section-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* 3. Sticky Summary Card */
        .sticky-summary-card {
            background: var(--white-color);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
            position: sticky;
            top: 100px; /* Adjust based on header height */
            z-index: 10;
        }

        /* 4. Pill-shaped Time Slots */
        .time-slots {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 12px;
        }

        .time-slot {
            border-radius: 50px !important; /* Pill shape */
            border: 1px solid var(--primary-color) !important;
            background: var(--white-color);
            color: var(--primary-color) !important;
            padding: 10px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .time-slot:hover {
            background-color: rgba(0, 31, 107, 0.05) !important; /* Very light blue */
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .time-slot.selected {
            background: var(--primary-color) !important;
            color: white !important;
            box-shadow: 0 5px 15px rgba(0, 31, 107, 0.3);
            transform: translateY(-2px);
        }

        /* 5. Input Styling Enhancements */
        .form-control {
            padding: 14px 18px !important; /* Increased padding */
            border-radius: 12px !important;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary-color) !important;
            box-shadow: 0 0 0 4px rgba(0, 31, 107, 0.1) !important; /* Navy glow */
        }

        /* Summary Items */
        .summary-item {
            margin-bottom: 18px;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 12px;
        }
        .summary-item:last-child { border-bottom: none; }
        
        .summary-icon {
            color: var(--primary-color);
            font-size: 1.2rem;
            margin-top: 2px;
            background: rgba(0, 31, 107, 0.05);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .summary-content strong {
            display: block;
            font-size: 0.8rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .summary-content span {
            font-weight: 600;
            color: var(--text-color);
            font-size: 1rem;
            line-height: 1.4;
        }

        .btn-confirm {
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 25px;
            background: linear-gradient(135deg, #001F6B 0%, #003B8E 100%);
            color: white;
            border: none;
            box-shadow: 0 10px 25px rgba(0, 31, 107, 0.25);
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-confirm:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 31, 107, 0.35);
        }

        .btn-confirm:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Dark Mode Overrides */
        body.theme-dark .form-section-card,
        body.theme-dark .sticky-summary-card {
            background: #1e293b;
            border-color: rgba(255,255,255,0.08);
        }

        body.theme-dark .time-slot {
            background: transparent;
            border-color: #38bdf8 !important;
            color: #38bdf8 !important;
        }

        body.theme-dark .time-slot:hover {
            background: rgba(56, 189, 248, 0.1) !important;
        }

        body.theme-dark .time-slot.selected {
            background: #38bdf8 !important;
            color: #0f172a !important;
        }

        body.theme-dark .form-control:focus {
            border-color: #38bdf8 !important;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15) !important;
        }
        
        body.theme-dark .btn-confirm {
            background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
            color: #0f172a;
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.3);
        }
        
        body.theme-dark .summary-icon {
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="logo">
                <a id="mainLogoLink" href="dashboard.html" title="Kontrol Paneline Dön" class="logo-link">
                    <span class="logo-text">LUMINEX</span>
                </a>
            </div>
            <div class="user-info">
                <span id="welcomeMessage" class="welcome-text"></span>
                <div class="top-bar-actions">
                    <!-- Dil Switcher -->
                    <div class="lang-switcher">
                        <button type="button" class="selected-lang">
                            <img src="https://flagcdn.com/tr.svg" alt="TR Flag">
                            <span>Türkçe</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        <ul class="lang-options">
                            <li data-lang="tr"><img src="https://flagcdn.com/tr.svg" alt="TR Flag"> Türkçe</li>
                            <li data-lang="en"><img src="https://flagcdn.com/gb.svg" alt="GB Flag"> English</li>
                        </ul>
                    </div>
                    <button id="themeToggleButton" class="top-bar-btn" title="Tema Değiştir">
                        <i class="fas fa-moon"></i>
                    </button>
                    <div class="notification-wrapper" style="position: relative !important; display: inline-block !important;">
                        <button class="top-bar-btn" title="Bildirimler" style="position: relative !important;">
                            <i class="fas fa-bell"></i>
                        </button>
                        <span class="notification-badge" style="
                            position: absolute !important;
                            top: -6px !important;
                            right: -6px !important;
                            z-index: 100 !important;
                            background: linear-gradient(135deg, #ff4757, #ff6b7a) !important;
                            color: white !important;
                            border-radius: 50% !important;
                            width: 18px !important;
                            height: 18px !important;
                            display: flex !important;
                            justify-content: center !important;
                            align-items: center !important;
                            font-size: 10px !important;
                            font-weight: bold !important;
                            border: 2px solid white !important;
                            pointer-events: none !important;
                        ">4</span>
                        <div class="notification-dropdown dropdown"></div>
                    </div>
                    <button class="top-bar-btn" onclick="window.location.href='profile.html'" title="Ayarlar">
                        <i class="fas fa-cog"></i>
                    </button>
                    <button id="logoutButton" class="top-bar-btn" title="Çıkış Yap">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <div class="main-wrapper">
            <!-- Side Menu -->
            <aside class="side-menu">
                <ul id="dynamicSideMenu">
                    <!-- Populated by header-manager.js -->
                </ul>
                <div class="sidebar-toggle-wrapper">
                    <button class="sidebar-toggle-button">
                        <i class="fas fa-chevron-left"></i>
                        <span>Menüyü Daralt</span>
                    </button>
                </div>
            </aside>

            <!-- Appointment Booking Content -->
            <main class="dashboard-content">
                <h1 data-lang="appointmentTitle">Randevu Al</h1>
                
                <form id="appointmentForm" class="appointment-layout">
                    <!-- Left Column: Form Sections -->
                    <div class="appointment-form-column">
                        <div class="form-section-card">
                            <h2 class="form-section-title" data-lang="locationInfo"><i class="fas fa-map-marker-alt"></i> Konum Bilgileri</h2>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="provinceInput" data-lang="provinceSelection">İl Seçimi</label>
                                    <div class="custom-select-wrapper">
                                        <input type="text" id="provinceInput" class="form-control" placeholder="İl yazın veya seçin..." autocomplete="off" data-lang-placeholder="typeOrSelectProvince">
                                        <div class="custom-options-panel" id="provinceOptionsPanel"></div>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="districtInput" data-lang="districtSelection">İlçe Seçimi</label>
                                    <div class="custom-select-wrapper">
                                        <input type="text" id="districtInput" class="form-control" placeholder="Önce İl Seçiniz" autocomplete="off" disabled data-lang-placeholder="selectProvinceFirst">
                                        <div class="custom-options-panel" id="districtOptionsPanel"></div>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="hospitalInput" data-lang="hospitalSelection">Hastane Seçimi</label>
                                    <div class="custom-select-wrapper">
                                        <input type="text" id="hospitalInput" class="form-control" placeholder="Önce İlçe Seçiniz" autocomplete="off" disabled data-lang-placeholder="selectDistrictFirst">
                                        <div class="custom-options-panel" id="hospitalOptionsPanel"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="form-section-card">
                            <h2 class="form-section-title" data-lang="appointmentDetails"><i class="fas fa-info-circle"></i> Randevu Detayları</h2>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="branchInput" data-lang="branchSelection">Branş Seçimi</label>
                                    <div class="custom-select-wrapper">
                                        <input type="text" id="branchInput" list="branchList" class="form-control" placeholder="Branş yazın veya seçin..." autocomplete="off" data-lang-placeholder="typeOrSelectBranch">
                                        <div class="custom-options-panel" id="branchOptionsPanel"></div>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="doctorInput" data-lang="doctorSelection">Doktor Seçimi</label>
                                    <div class="custom-select-wrapper">
                                        <input type="text" id="doctorInput" list="doctorList" class="form-control" placeholder="Hastane ve Branş Seçiniz" autocomplete="off" disabled data-lang-placeholder="selectHospitalAndBranch">
                                        <div class="custom-options-panel" id="doctorOptionsPanel"></div>
                                    </div>
                                </div>
                                <div class="form-group" id="patientSelectionGroup" style="display: none;">
                                    <label for="patientSelect" data-lang="appointmentPerson">Randevu Alan Kişi</label>
                                    <div class="input-wrapper">
                                        <i class="fas fa-user-friends"></i>
                                        <select id="patientSelect" class="form-control">
                                            <!-- Options will be dynamically loaded by JS -->
                                        </select>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="appointmentDate" data-lang="dateSelection">Tarih Seçimi</label>
                                    <input type="date" id="appointmentDate" class="form-control" disabled>
                                </div>
                            </div>
                        </div>

                        <div class="form-section-card">
                            <h2 class="form-section-title" data-lang="availableHours"><i class="fas fa-clock"></i> Müsait Saatler</h2>
                             <div id="timeSlots" class="time-slots">
                                <p class="time-slot-placeholder" data-lang="selectDateFirst">Lütfen tarih seçimi yapınız.</p>
                            </div>
                        </div>
                        
                        <div class="form-section-card">
                            <h2 class="form-section-title" data-lang="importantHealthInfo"><i class="fas fa-notes-medical"></i> Önemli Sağlık Bilgisi</h2>
                            <div class="form-group">
                                <div class="input-wrapper">
                                    <textarea id="healthInfo" class="form-control" rows="4" placeholder="Önemli sağlık bilgilerinizi buraya yazabilirsiniz..." data-lang-placeholder="enterHealthInfoPlaceholder"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column: Sticky Summary -->
                    <div class="appointment-summary-column">
                        <div class="sticky-summary-card">
                            <h3 class="form-section-title" style="margin-bottom: 20px; font-size: 1.2rem;"><i class="fas fa-clipboard-check"></i> <span data-lang="appointmentSummary">Randevu Özeti</span></h3>
                            
                            <div class="summary-item">
                                <div class="summary-icon"><i class="fas fa-user"></i></div>
                                <div class="summary-content"><strong data-lang="patientLabel">Hasta</strong> <span id="summaryPatient" data-lang="notSelected">Seçilmedi</span></div>
                            </div>
                            <div class="summary-item">
                                <div class="summary-icon"><i class="fas fa-user-md"></i></div>
                                <div class="summary-content"><strong data-lang="doctorLabel">Doktor</strong> <span id="summaryDoctor" data-lang="notSelected">Seçilmedi</span></div>
                            </div>
                            <div class="summary-item">
                                <div class="summary-icon"><i class="fas fa-calendar-alt"></i></div>
                                <div class="summary-content"><strong data-lang="dateLabel">Tarih</strong> <span id="summaryDate" data-lang="notSelected">Seçilmedi</span></div>
                            </div>
                            <div class="summary-item">
                                <div class="summary-icon"><i class="fas fa-clock"></i></div>
                                <div class="summary-content"><strong data-lang="timeLabel">Saat</strong> <span id="summaryTime" data-lang="notSelected">Seçilmedi</span></div>
                            </div>
                            <div class="summary-item" style="border-bottom: none;">
                                <div class="summary-icon"><i class="fas fa-notes-medical"></i></div>
                                <div class="summary-content"><strong data-lang="healthInfo">Sağlık Bilgisi</strong> <span id="summaryHealthInfo" data-lang="notEntered">Girilmedi</span></div>
                            </div>

                            <button type="submit" class="btn-confirm" disabled data-lang="confirmAppointment">
                                <i class="fas fa-check-circle"></i> Randevuyu Onayla
                            </button>
                        </div>
                    </div>
                </form>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script src="js/language-manager.js"></script>
    <script type="module" src="js/utils/storage-utils.js"></script>
    <script type="module" src="js/utils/header-manager.js"></script>
    <script type="module" src="js/user-session.js"></script>
    <script type="module" src="js/appointment.js"></script>
</body>
</html>
