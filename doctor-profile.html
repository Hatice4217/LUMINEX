<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMINEX - Doktor Profil Yönetimi</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700&display=swap" rel="stylesheet">
<script>
      try {
        if (localStorage.getItem('sidebarCollapsed') === 'true') {
          document.documentElement.classList.add('sidebar-is-collapsed');
        }
      } catch (e) {}
    </script>
<style>
        /* Premium Doctor Profile Styles */
        :root {
            --card-shadow: 0 10px 30px rgba(0,0,0,0.05);
            --hover-transform: translateY(-3px);
        }

        .doctor-profile-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
            align-items: start;
        }

        @media (max-width: 992px) {
            .doctor-profile-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Sidebar */
        .profile-sidebar {
            background: var(--white-color);
            border-radius: 24px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-color);
            position: sticky;
            top: 100px;
        }

        .profile-avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .profile-avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .avatar-edit-overlay {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 35px;
            height: 35px;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid white;
        }

        .avatar-edit-overlay:hover {
            transform: scale(1.1);
            background: var(--accent-color);
        }

        .profile-name-display {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-color);
            margin: 0 0 5px;
        }

        .profile-title-display {
            font-size: 0.9rem;
            color: var(--text-light);
            display: block;
            margin-bottom: 25px;
        }

        .profile-stats-mini {
            display: flex;
            justify-content: center;
            gap: 15px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .stat-mini-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-mini-item strong {
            font-size: 1.1rem;
            color: var(--primary-color);
            font-weight: 700;
        }

        .stat-mini-item span {
            font-size: 0.75rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Main Content Area */
        .profile-main {
            background: var(--white-color);
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        /* Tabs */
        .profile-tabs {
            display: flex;
            background: rgba(0, 31, 107, 0.02);
            border-bottom: 1px solid var(--border-color);
            padding: 0 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .profile-tab {
            padding: 20px 25px;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
        }

        .profile-tab i {
            font-size: 1.1rem;
            opacity: 0.7;
            transition: all 0.3s ease;
        }

        .profile-tab:hover {
            color: var(--primary-color);
            background: rgba(0, 31, 107, 0.04);
        }

        .profile-tab:hover i {
            opacity: 1;
            transform: scale(1.1);
        }

        .profile-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
            background: white;
        }

        .profile-tab.active i {
            opacity: 1;
            color: var(--primary-color);
        }

        .profile-content-body {
            padding: 40px;
        }

        .profile-section {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .profile-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Form Enhancements */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 10px;
            display: block;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        .form-control {
            height: 50px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 0 18px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background-color: var(--input-bg);
            color: var(--text-color);
            width: 100%;
            font-family: 'Inter', sans-serif;
        }
        
        textarea.form-control {
            height: auto;
            padding: 15px;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(0, 31, 107, 0.08);
            background-color: var(--white-color);
        }

        .form-control:disabled, .form-control:read-only {
            background-color: rgba(0,0,0,0.02);
            color: var(--text-light);
            cursor: not-allowed;
            border-color: transparent;
        }

        /* Theme Options */
        .theme-option {
            background-color: var(--white-color);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .theme-option:hover {
            border-color: var(--primary-color);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .theme-option.selected {
            border-color: var(--primary-color);
            background: linear-gradient(135deg, rgba(0, 31, 107, 0.03), rgba(0, 31, 107, 0.01));
            box-shadow: 0 0 0 2px rgba(0, 31, 107, 0.1);
        }

        .theme-preview-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border: 3px solid white;
        }

        /* Password Input Wrapper */
        .password-input-wrapper {
            position: relative;
        }
        
        .password-input-wrapper .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            cursor: pointer;
            padding: 5px;
            transition: color 0.3s;
        }
        
        .password-input-wrapper .toggle-password:hover {
            color: var(--primary-color);
        }

        /* Buttons */
        .btn {
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #001F6B 0%, #003B8E 100%);
            box-shadow: 0 4px 15px rgba(0, 31, 107, 0.2);
            border: none;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 31, 107, 0.3);
        }

        /* Dark Mode Overrides */
        body.theme-dark .profile-sidebar,
        body.theme-dark .profile-main,
        body.theme-dark .theme-option {
            background-color: #1e293b;
            border-color: rgba(255,255,255,0.08);
        }

        body.theme-dark .profile-tabs {
            background: rgba(0,0,0,0.2);
            border-bottom-color: rgba(255,255,255,0.08);
        }

        body.theme-dark .profile-tab.active {
            background: #1e293b;
            color: #38bdf8;
            border-bottom-color: #38bdf8;
        }
        
        body.theme-dark .profile-tab:hover {
            color: #38bdf8;
            background: rgba(255,255,255,0.05);
        }

        body.theme-dark .form-control {
            background-color: #0f172a;
            border-color: rgba(255,255,255,0.1);
            color: #f1f5f9;
        }

        body.theme-dark .form-control:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        }
        
        body.theme-dark .form-control:disabled {
            background-color: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.4);
        }
        
        body.theme-dark .theme-option:hover {
            border-color: #38bdf8;
        }
        
        body.theme-dark .theme-option.selected {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
        }
        
        body.theme-dark .btn-primary {
            background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
            color: #0f172a;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }
        
        body.theme-dark .profile-avatar-img {
            border-color: #334155;
        }
        
        body.theme-dark .avatar-edit-overlay {
            border-color: #334155;
            background: #38bdf8;
            color: #0f172a;
        }
</style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="logo">
                <a id="mainLogoLink" href="dashboard.html" title="Kontrol Paneline Dön" style="display: flex; align-items: center; gap: 2px; margin-left: -30px;">
                    <div style="
                        width: 60px; 
                        height: 60px; 
                        background: linear-gradient(135deg, #004e92 0%, #001F6B 50%, #000428 100%); 
                        -webkit-mask: url(clean-logo.png) no-repeat center / contain; 
                        mask: url(clean-logo.png) no-repeat center / contain;
                        display: inline-block;">
                    </div>
                    <span style="font-family: 'Exo 2', sans-serif; font-size: 2.5rem; font-weight: 700; color: #001F6B; letter-spacing: 1px; display: flex; align-items: center; text-shadow: 1px 1px 2px rgba(0,0,0,0.1);">LUMINEX</span>
                </a>
            </div>
            <div class="user-info">
                <span id="welcomeMessage"></span>
                <div class="icons">
                    <i id="themeToggleButton" class="fas fa-moon"></i>
                    <i class="fas fa-bell"></i>
                    <i class="fas fa-cog"></i>
                    <i id="logoutButton" class="fas fa-sign-out-alt"></i>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <div class="main-wrapper">
            <!-- Side Menu -->
            <aside class="side-menu">
                <ul id="dynamicSideMenu">
                    <!-- Populated by header-manager.js -->
                </ul>
                <div class="sidebar-toggle-wrapper">
                    <button class="sidebar-toggle-button">
                        <i class="fas fa-chevron-left"></i>
                        <span>Menüyü Daralt</span>
                    </button>
                </div>
            </aside>

            <!-- Doctor Profile Management Content -->
            <main class="dashboard-content">
                <h1>Profil Yönetimi</h1>
                
                <div class="doctor-profile-grid">
                    <!-- Sidebar (Visual Identity) -->
                    <aside class="profile-sidebar">
                        <div class="profile-avatar-container">
                            <img src="https://via.placeholder.com/150" alt="Profil Fotoğrafı" class="profile-avatar-img" id="profileImageDisplay">
                            <label for="avatarUpload" class="avatar-edit-overlay">
                                <i class="fas fa-camera"></i>
                            </label>
                            <input type="file" id="avatarUpload" hidden accept="image/*">
                        </div>
                        <h2 class="profile-name-display" id="profileNameDisplay">Dr. Ayşe Yılmaz</h2>
                        <span class="profile-title-display" id="profileTitleDisplay">Uzm. Dr. - Kardiyoloji</span>
                        
                        <div class="profile-stats-mini">
                            <div class="stat-mini-item">
                                <strong>4.8</strong>
                                <span>Puan</span>
                            </div>
                            <div class="stat-mini-item">
                                <strong>120+</strong>
                                <span>Hasta</span>
                            </div>
                            <div class="stat-mini-item">
                                <strong>10</strong>
                                <span>Yıl</span>
                            </div>
                        </div>
                    </aside>

                    <!-- Main Content (Forms) -->
                    <section class="profile-main">
                        <div class="profile-tabs">
                            <div class="profile-tab active" data-target="personal-info"><i class="fas fa-user"></i> Kişisel Bilgiler</div>
                            <div class="profile-tab" data-target="security"><i class="fas fa-lock"></i> Güvenlik</div>
                        </div>

                        <div class="profile-content-body">
                            <!-- Personal Info Tab -->
                            <div id="personal-info" class="profile-section active">
                                <form id="doctorProfileForm">
                                    <div class="form-grid">
                                        <div class="form-group">
                                            <label for="doctorFullName">Ad Soyad</label>
                                            <input type="text" id="doctorFullName" class="form-control" readonly>
                                        </div>
                                        <div class="form-group">
                                            <label for="doctorTitle">Ünvan</label>
                                            <input type="text" id="doctorTitle" class="form-control">
                                        </div>
                                        <div class="form-group">
                                            <label for="doctorEmail">E-posta</label>
                                            <input type="email" id="doctorEmail" class="form-control" readonly>
                                        </div>
                                        <div class="form-group">
                                            <label for="doctorBranch">Branş</label>
                                            <input type="text" id="doctorBranch" class="form-control" readonly>
                                        </div>
                                        <div class="form-group" style="grid-column: span 2;">
                                            <label for="doctorHospital">Çalıştığı Hastane</label>
                                            <input type="text" id="doctorHospital" class="form-control" readonly>
                                        </div>
                                        <div class="form-group" style="grid-column: span 2;">
                                            <label for="doctorAbout">Hakkında</label>
                                            <textarea id="doctorAbout" class="form-control" rows="4"></textarea>
                                        </div>
                                    </div>
                                    
                                    <div class="form-actions" style="margin-top: 20px; text-align: right;">
                                        <button type="button" class="btn btn-primary" id="editDoctorProfileBtn">Düzenle</button>
                                        <button type="submit" class="btn btn-success" id="saveDoctorProfileBtn" style="display: none;">Değişiklikleri Kaydet</button>
                                        <button type="button" class="btn btn-secondary" id="cancelDoctorEditBtn" style="display: none;">İptal</button>
                                    </div>
                                </form>
                            </div>

                            <!-- Security Tab -->
                            <div id="security" class="profile-section">
                                <h4 style="color: var(--text-color); border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 20px;"><i class="fas fa-lock"></i> Şifre Değişikliği</h4>
                                <form id="doctorPasswordChangeForm" style="max-width: 500px;">
                                    <div class="form-group">
                                        <label for="doctorCurrentPassword">Mevcut Şifre</label>
                                        <div class="password-input-wrapper">
                                            <input type="password" id="doctorCurrentPassword" class="form-control" autocomplete="current-password">
                                            <span class="toggle-password" data-target="doctorCurrentPassword"><i class="fas fa-eye"></i></span>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label for="doctorNewPassword">Yeni Şifre</label>
                                        <div class="password-input-wrapper">
                                            <input type="password" id="doctorNewPassword" class="form-control" autocomplete="new-password">
                                            <span class="toggle-password" data-target="doctorNewPassword"><i class="fas fa-eye"></i></span>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label for="doctorConfirmNewPassword">Yeni Şifre Tekrar</label>
                                        <div class="password-input-wrapper">
                                            <input type="password" id="doctorConfirmNewPassword" class="form-control" autocomplete="new-password">
                                            <span class="toggle-password" data-target="doctorConfirmNewPassword"><i class="fas fa-eye"></i></span>
                                        </div>
                                    </div>
                                    <div class="form-actions" style="margin-top: 20px; text-align: right;">
                                        <button type="submit" class="btn btn-danger">Şifreyi Güncelle</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </section>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script type="module" src="js/user-session.js"></script>
    <script type="module" src="js/utils/header-manager.js"></script>
    <script type="module" src="js/doctor-profile.js"></script>
    <script>
        // Password Toggle Functionality
        document.addEventListener('DOMContentLoaded', function() {
            const toggleButtons = document.querySelectorAll('.toggle-password');
            toggleButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const targetId = this.getAttribute('data-target');
                    const input = document.getElementById(targetId);
                    if (input) {
                        const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                        input.setAttribute('type', type);
                        const icon = this.querySelector('i');
                        icon.classList.toggle('fa-eye');
                        icon.classList.toggle('fa-eye-slash');
                    }
                });
            });
        });
    </script>
</body>
</html>
