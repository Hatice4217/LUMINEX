<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMINEX - Gönderilen Mesajlar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700&display=swap" rel="stylesheet">
<script>
      try {
        if (localStorage.getItem('sidebarCollapsed') === 'true') {
          document.documentElement.classList.add('sidebar-is-collapsed');
        }
      } catch (e) {}
    </script>
</head>
<body>
    <div class="dashboard-container">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="logo">
                <a id="mainLogoLink" href="dashboard.html" title="Kontrol Paneline Dön" class="logo-link">
                    <span class="logo-text">LUMINEX</span>
                </a>
            </div>
            <div class="user-info">
                <span id="welcomeMessage" class="welcome-text"></span>
                <div class="top-bar-actions">
                    <!-- Dil Switcher -->
                    <div class="lang-switcher">
                        <button type="button" class="selected-lang">
                            <img src="https://flagcdn.com/tr.svg" alt="TR Flag">
                            <span>Türkçe</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        <ul class="lang-options">
                            <li data-lang="tr"><img src="https://flagcdn.com/tr.svg" alt="TR Flag"> Türkçe</li>
                            <li data-lang="en"><img src="https://flagcdn.com/gb.svg" alt="GB Flag"> English</li>
                        </ul>
                    </div>
                    <button id="themeToggleButton" class="top-bar-btn" title="Tema Değiştir">
                        <i class="fas fa-moon"></i>
                    </button>
                    <div class="notification-wrapper" style="position: relative !important; display: inline-block !important;">
                        <button class="top-bar-btn" title="Bildirimler" style="position: relative !important;">
                            <i class="fas fa-bell"></i>
                        </button>
                        <span class="notification-badge" style="
                            position: absolute !important;
                            top: -6px !important;
                            right: -6px !important;
                            z-index: 100 !important;
                            background: linear-gradient(135deg, #ff4757, #ff6b7a) !important;
                            color: white !important;
                            border-radius: 50% !important;
                            width: 18px !important;
                            height: 18px !important;
                            display: flex !important;
                            justify-content: center !important;
                            align-items: center !important;
                            font-size: 10px !important;
                            font-weight: bold !important;
                            border: 2px solid white !important;
                            pointer-events: none !important;
                        ">4</span>
                        <div class="notification-dropdown dropdown"></div>
                    </div>
                    <button class="top-bar-btn" onclick="window.location.href='doctor-profile.html'" title="Ayarlar">
                        <i class="fas fa-cog"></i>
                    </button>
                    <button id="logoutButton" class="top-bar-btn" title="Çıkış Yap">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <div class="main-wrapper">
            <!-- Side Menu -->
            <aside class="side-menu">
                <ul id="dynamicSideMenu">
                    <!-- Populated by header-manager.js -->
                </ul>
                <div class="sidebar-toggle-wrapper">
                    <button class="sidebar-toggle-button">
                        <i class="fas fa-chevron-left"></i>
                        <span>Menüyü Daralt</span>
                    </button>
                </div>
            </aside>

            <!-- Sent Messages Content -->
            <main class="dashboard-content">
                <h1>Gönderilen Mesajlar</h1>
                
                <div class="card">
                    <h2>Gönderilen Mesaj Kutusu</h2>
                    <div id="sentMessagesList" class="doctor-messages-list">
                        <!-- Sent messages will be loaded here -->
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script type="module" src="js/user-session.js"></script>
    <script type="module" src="js/utils/header-manager.js"></script>
    <script type="module" src="js/doctor-sent-messages.js"></script>
</body>
</html>
