<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-lang="healthHistorySidebar">LUMINEX - Sağlık Geçmişim</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="css/skeleton.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <script>
        try {
            if (localStorage.getItem('sidebarCollapsed') === 'true') {
                document.documentElement.classList.add('sidebar-is-collapsed');
            }
        } catch (e) {}
    </script>
    <style>
        /* Modern Health History Styles - Similar to Doctors Page */
        :root {
            --primary-gradient: linear-gradient(135deg, #001F6B 0%, #003B8E 100%);
            --accent-gradient: linear-gradient(135deg, #78C7C7 0%, #5BA8A8 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --card-shadow: 0 10px 40px rgba(0, 31, 107, 0.08);
            --hover-shadow: 0 20px 60px rgba(0, 31, 107, 0.15);
        }

        /* Search Bar */
        .search-section {
            background: var(--glass-bg);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 31, 107, 0.08);
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .search-wrapper {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .search-input {
            width: 100%;
            padding: 16px 50px 16px 50px;
            border: 2px solid rgba(0, 31, 107, 0.1);
            border-radius: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        .search-input:focus {
            outline: none;
            border-color: #78C7C7;
            box-shadow: 0 0 0 4px rgba(120, 199, 199, 0.1);
        }

        .search-input::placeholder {
            color: #94a3b8;
        }

        /* Type Tabs */
        .type-tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0 20px;
            margin-bottom: 25px;
            scrollbar-width: none;
        }

        .type-tabs::-webkit-scrollbar {
            display: none;
        }

        .type-tab {
            padding: 12px 24px;
            border: 2px solid rgba(0, 31, 107, 0.1);
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            color: #64748b;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .type-tab:hover {
            border-color: #78C7C7;
            color: #78C7C7;
        }

        .type-tab.active {
            background: var(--primary-gradient);
            border-color: transparent;
            color: white;
        }

        .type-tab.all.active {
            background: var(--accent-gradient);
        }

        /* History Grid */
        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        @media (max-width: 768px) {
            .history-grid {
                grid-template-columns: 1fr;
            }
            .search-section {
                flex-direction: column;
                align-items: stretch;
            }
        }

        /* History Card */
        .history-card {
            background: var(--glass-bg);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(0, 31, 107, 0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .history-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--primary-gradient);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .history-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--hover-shadow);
        }

        .history-card:hover::before {
            opacity: 1;
        }

        .history-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 16px;
        }

        .history-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .history-icon.randevu {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .history-icon.tahlil {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
        }

        .history-icon.recete {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }

        .history-icon.rontgen {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        .history-info h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #001F6B;
            margin: 0 0 4px 0;
            line-height: 1.3;
        }

        .history-date {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 500;
        }

        .history-meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(0, 31, 107, 0.08);
        }

        .history-meta-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: #64748b;
        }

        .history-meta-item i {
            color: #94a3b8;
            width: 16px;
            text-align: center;
        }

        .history-actions {
            display: flex;
            gap: 10px;
        }

        .history-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .history-btn.view {
            background: var(--primary-gradient);
            color: white;
        }

        .history-btn:hover {
            transform: translateY(-2px);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 40px;
            background: var(--glass-bg);
            border-radius: 20px;
            border: 2px dashed rgba(0, 31, 107, 0.15);
        }

        .empty-state i {
            font-size: 4rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            color: #001F6B;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #64748b;
            margin-bottom: 20px;
        }

        /* Loading State */
        .loading-state {
            text-align: center;
            padding: 60px 40px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 31, 107, 0.1);
            border-top-color: #78C7C7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Dark Mode */
        body.theme-dark .search-section,
        body.theme-dark .history-card {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(56, 189, 248, 0.15);
        }

        body.theme-dark .search-input {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(56, 189, 248, 0.2);
            color: #f8fafc;
        }

        body.theme-dark .history-info h3,
        body.theme-dark .empty-state h3 {
            color: #38bdf8;
        }

        body.theme-dark .type-tab {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(56, 189, 248, 0.2);
            color: #94a3b8;
        }

        /* Modern Modal Styles (SweetAlert2) */
        .modern-swal-popup {
            background: #ffffff !important;
            border-radius: 16px !important;
            padding: 0 !important;
        }

        .modern-swal-container {
            background: #ffffff !important;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(0, 31, 107, 0.08);
        }

        .modern-swal-container .modern-results-header h2 {
            color: #0f172a !important;
            font-size: 1.4rem !important;
            margin-bottom: 16px !important;
        }

        .modern-swal-container .modern-results-header p {
            color: #475569 !important;
            font-size: 0.9rem !important;
            margin: 4px 0 !important;
        }

        .modern-swal-container .modern-results-body {
            color: #334155 !important;
        }

        .modern-swal-container .result-parameter-card {
            background: #f8fafc !important;
            border: 1px solid rgba(0, 31, 107, 0.08) !important;
        }

        .modern-swal-container .parameter-name {
            color: #0f172a !important;
        }

        .modern-swal-container .parameter-range {
            color: #64748b !important;
        }

        .modern-swal-container .parameter-value .value {
            color: #0f172a !important;
        }

        .modern-swal-container .parameter-value .unit {
            color: #78C7C7 !important;
        }

        .modern-swal-container .result-report-card h4 {
            color: #0f172a !important;
        }

        .modern-swal-container .result-report-card p {
            color: #334155 !important;
        }

        /* Dark Mode Modal */
        body.theme-dark .modern-swal-popup {
            background: #1e293b !important;
        }

        body.theme-dark .modern-swal-container {
            background: #1e293b !important;
            border-color: rgba(56, 189, 248, 0.15) !important;
        }

        body.theme-dark .modern-swal-container .modern-results-header h2,
        body.theme-dark .modern-swal-container .result-report-card h4 {
            color: #38bdf8 !important;
        }

        body.theme-dark .modern-swal-container .modern-results-header p,
        body.theme-dark .modern-swal-container .result-report-card p {
            color: #94a3b8 !important;
        }

        body.theme-dark .modern-swal-container .modern-results-body {
            color: #cbd5e1 !important;
        }

        body.theme-dark .modern-swal-container .result-parameter-card {
            background: #0f172a !important;
            border-color: rgba(56, 189, 248, 0.15) !important;
        }

        body.theme-dark .modern-swal-container .parameter-name {
            color: #38bdf8 !important;
        }

        body.theme-dark .modern-swal-container .parameter-range {
            color: #64748b !important;
        }

        body.theme-dark .modern-swal-container .parameter-value .value {
            color: #f8fafc !important;
        }

        body.theme-dark .modern-swal-container .parameter-value .unit {
            color: #38bdf8 !important;
        }

        body.theme-dark .modern-swal-container .result-report-card p {
            color: #cbd5e1 !important;
        }

        /* Result Report Card Styles */
        .modern-swal-container .result-report-card {
            background: #f8fafc;
            border: 1px solid rgba(0, 31, 107, 0.08);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .modern-swal-container .result-report-card h4 {
            color: #0f172a;
            font-size: 1.1rem;
            margin-bottom: 8px;
            display: block;
        }

        .modern-swal-container .result-report-card p {
            color: #334155;
            line-height: 1.6;
            margin-bottom: 0;
        }

        .modern-swal-container .result-report-card h4 i {
            color: #78C7C7;
            margin-right: 8px;
        }

        body.theme-dark .modern-swal-container .result-report-card {
            background: rgba(30, 41, 59, 0.6);
            border-color: rgba(56, 189, 248, 0.15);
        }

        body.theme-dark .modern-swal-container .result-report-card h4 {
            color: #38bdf8;
        }

        body.theme-dark .modern-swal-container .result-report-card p {
            color: #cbd5e1;
        }

        body.theme-dark .modern-swal-container .result-report-card h4 i {
            color: #38bdf8;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .history-card {
            animation: fadeInUp 0.5s ease forwards;
        }

        .history-card:nth-child(1) { animation-delay: 0.1s; }
        .history-card:nth-child(2) { animation-delay: 0.15s; }
        .history-card:nth-child(3) { animation-delay: 0.2s; }
        .history-card:nth-child(4) { animation-delay: 0.25s; }
        .history-card:nth-child(5) { animation-delay: 0.3s; }
        .history-card:nth-child(6) { animation-delay: 0.35s; }
    </style>
</head>
<body lang="tr">
    <div class="dashboard-container">
        <header class="top-bar">
            <div class="logo">
                <a id="mainLogoLink" href="dashboard.html" title="Kontrol Paneline Dön" class="logo-link">
                    <span class="logo-text">LUMINEX</span>
                </a>
            </div>
            <div class="user-info">
                <span id="welcomeMessage" class="welcome-text"></span>
                <div class="top-bar-actions">
                    <div class="lang-switcher">
                        <button type="button" class="selected-lang">
                            <img src="https://flagcdn.com/tr.svg" alt="TR Flag">
                            <span>Türkçe</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        <ul class="lang-options">
                            <li data-lang="tr"><img src="https://flagcdn.com/tr.svg" alt="TR Flag"> Türkçe</li>
                            <li data-lang="en"><img src="https://flagcdn.com/gb.svg" alt="GB Flag"> English</li>
                        </ul>
                    </div>
                    <button id="themeToggleButton" class="top-bar-btn" title="Tema Değiştir">
                        <i class="fas fa-moon"></i>
                    </button>
                    <div class="notification-wrapper" style="position: relative !important; display: inline-block !important;">
                        <button class="top-bar-btn" title="Bildirimler" style="position: relative !important;">
                            <i class="fas fa-bell"></i>
                        </button>
                        <span class="notification-badge" style="
                            position: absolute !important;
                            top: -6px !important;
                            right: -6px !important;
                            z-index: 100 !important;
                            background: linear-gradient(135deg, #ff4757, #ff6b7a) !important;
                            color: white !important;
                            border-radius: 50% !important;
                            width: 18px !important;
                            height: 18px !important;
                            display: flex !important;
                            justify-content: center !important;
                            align-items: center !important;
                            font-size: 10px !important;
                            font-weight: bold !important;
                            border: 2px solid white !important;
                            pointer-events: none !important;
                        ">4</span>
                        <div class="notification-dropdown dropdown"></div>
                    </div>
                    <button class="top-bar-btn" onclick="window.location.href='profile-settings.html'" title="Ayarlar">
                        <i class="fas fa-cog"></i>
                    </button>
                    <button id="logoutButton" class="top-bar-btn" title="Çıkış Yap">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </header>

        <div class="main-wrapper">
            <aside class="side-menu">
                <ul id="dynamicSideMenu"></ul>
                <ul id="fallbackSideMenu" style="display: block !important; visibility: visible !important; opacity: 1 !important;">
                    <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> <span>Kontrol Paneli</span></a></li>
                    <li><a href="my-appointments.html"><i class="fas fa-calendar-alt"></i> <span>Randevularım</span></a></li>
                    <li><a href="doctors.html"><i class="fas fa-user-md"></i> <span>Doktorlar / Branşlar</span></a></li>
                    <li><a href="prescriptions.html"><i class="fas fa-prescription-bottle-alt"></i> <span>Reçetelerim</span></a></li>
                    <li><a href="health-history.html" class="active"><i class="fas fa-notes-medical"></i> <span>Sağlık Geçmişim</span></a></li>
                    <li><a href="payments.html"><i class="fas fa-credit-card"></i> <span>Ödemeler & Faturalar</span></a></li>
                    <li><a href="family-accounts.html"><i class="fas fa-users"></i> <span>Bağlı Hesaplar</span></a></li>
                    <li><a href="my-reviews.html"><i class="fas fa-star"></i> <span>Değerlendirmelerim</span></a></li>
                    <li><a href="feedback.html"><i class="fas fa-comment-dots"></i> <span>Geri Bildirim</span></a></li>
                    <li><a href="contact.html"><i class="fas fa-headset"></i> <span>İletişim / Destek</span></a></li>
                </ul>
                <div class="sidebar-toggle-wrapper">
                    <button class="sidebar-toggle-button">
                        <i class="fas fa-chevron-left"></i>
                        <span data-lang="collapseMenu">Menüyü Daralt</span>
                    </button>
                </div>
            </aside>

            <main class="dashboard-content">
                <h1 data-lang="healthHistorySidebar" class="reveal">Sağlık Geçmişim</h1>

                <!-- Search Bar -->
                <div class="search-section reveal">
                    <div class="search-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" id="historySearch" class="search-input" placeholder="Sağlık geçmişinde ara...">
                    </div>
                </div>

                <!-- Type Tabs -->
                <div class="type-tabs" id="typeTabs">
                    <button class="type-tab all active" data-type="all" data-lang="all">Tümü</button>
                    <button class="type-tab" data-type="randevu" data-lang="appointmentTitle">Randevular</button>
                    <button class="type-tab" data-type="tahlil" data-lang="testTitle">Tahliller</button>
                    <button class="type-tab" data-type="recete" data-lang="prescriptionTitle">Reçeteler</button>
                    <button class="type-tab" data-type="rontgen" data-lang="radiologyTitle">Röntgenler</button>
                </div>

                <!-- History Grid -->
                <div class="history-grid" id="healthHistoryList">
                    <!-- Loading state will be shown initially -->
                    <div class="loading-state">
                        <div class="loading-spinner"></div>
                        <p data-lang="loading">Yükleniyor...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script type="module" src="js/language-manager.js"></script>
    <script type="module" src="js/user-session.js"></script>
    <script type="module" src="js/utils/header-manager.js"></script>
    <script type="module" src="js/health-history.js"></script>
</body>
</html>
